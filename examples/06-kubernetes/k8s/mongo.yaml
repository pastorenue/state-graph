apiVersion: apps/v1
kind: Deployment
metadata:
  name: mongo
  namespace: kflow
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mongo
  template:
    metadata:
      labels:
        app: mongo
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 999
      containers:
        - name: mongo
          image: mongo:7
          ports:
            - containerPort: 27017
          securityContext:
            capabilities:
              drop: ["ALL"]
          readinessProbe:
            exec:
              command: ["mongosh", "--eval", "db.runCommand('ping').ok", "--quiet"]
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: mongo
  namespace: kflow
spec:
  selector:
    app: mongo
  ports:
    - port: 27017
      targetPort: 27017
