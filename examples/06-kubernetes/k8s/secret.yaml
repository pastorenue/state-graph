apiVersion: v1
kind: Secret
metadata:
  name: kflow-secrets
  namespace: kflow
type: Opaque
stringData:
  KFLOW_MONGO_URI: "mongodb://mongo.kflow.svc.cluster.local:27017"
  # Replace with a random 32+ byte value before deploying to production.
  KFLOW_RUNNER_TOKEN_SECRET: "change-me-use-a-random-32-byte-secret-here"
