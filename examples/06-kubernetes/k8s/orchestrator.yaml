apiVersion: apps/v1
kind: Deployment
metadata:
  name: kflow-orchestrator
  namespace: kflow
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kflow-orchestrator
  template:
    metadata:
      labels:
        app: kflow-orchestrator
    spec:
      serviceAccountName: kflow-orchestrator
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
      containers:
        - name: orchestrator
          image: kflow:dev
          imagePullPolicy: Never
          ports:
            - containerPort: 8080
              name: grpc-gateway
            - containerPort: 9090
              name: runner-grpc
          securityContext:
            capabilities:
              drop: ["ALL"]
            readOnlyRootFilesystem: true
          env:
            - name: KFLOW_NAMESPACE
              value: kflow
            - name: KFLOW_IMAGE
              value: kflow-example-k8s:dev
            - name: KFLOW_RUNNER_GRPC_ENDPOINT
              value: "kflow-cp.kflow.svc.cluster.local:9090"
          envFrom:
            - secretRef:
                name: kflow-secrets
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: kflow-orchestrator
  namespace: kflow
spec:
  selector:
    app: kflow-orchestrator
  ports:
    - name: grpc-gateway
      port: 8080
      targetPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: kflow-cp
  namespace: kflow
spec:
  selector:
    app: kflow-orchestrator
  ports:
    - name: runner-grpc
      port: 9090
      targetPort: 9090
  clusterIP: None
