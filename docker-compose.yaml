services:
  orchestrator:
    build: .
    ports:
      - "8080:8080"
      - "9090:9090"
    environment:
      KFLOW_MONGO_URI: "mongodb://mongo:27017"
      KFLOW_MONGO_DB: kflow
      KFLOW_NAMESPACE: kflow
      KFLOW_CLICKHOUSE_DSN: "clickhouse://clickhouse:9000"
      KFLOW_GRPC_PORT: "8080"
      KFLOW_RUNNER_GRPC_PORT: "9090"
      KFLOW_RUNNER_GRPC_ENDPOINT: "orchestrator:9090"
      KFLOW_RUNNER_TOKEN_SECRET: "kflow-dev-secret-key-for-local-docker-compose"
    depends_on:
      mongo:
        condition: service_healthy
      clickhouse:
        condition: service_healthy

  web-ui:
    image: node:22-alpine
    working_dir: /app
    volumes:
      - ./ui:/app
    ports:
      - "5173:5173"
    environment:
      VITE_API_TARGET: "http://orchestrator:8080"
    command: sh -c "npm install && npm run dev -- --host"
    depends_on:
      - orchestrator

  test:
    image: golang:1.22
    working_dir: /workspace
    volumes:
      - .:/workspace
    command: go test -race ./...
    profiles:
      - test

  test-integration:
    image: golang:1.22
    working_dir: /workspace
    volumes:
      - .:/workspace
    environment:
      KFLOW_TEST_MONGO_URI: "mongodb://mongo:27017"
      KFLOW_TEST_CLICKHOUSE_DSN: "clickhouse://clickhouse:9000"
    command: go test -race -tags integration ./...
    profiles:
      - test-integration
    depends_on:
      mongo:
        condition: service_healthy
      clickhouse:
        condition: service_healthy

  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 5

  clickhouse:
    image: clickhouse/clickhouse-server:24
    ports:
      - "9000:9000"
      - "8123:8123"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8123/ping"]
      interval: 5s
      timeout: 5s
      retries: 5
