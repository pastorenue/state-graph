apiVersion: v1
kind: Service
metadata:
  name: {{ include "kflow.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kflow.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  selector:
    {{- include "kflow.selectorLabels" . | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
    {{- if eq .Values.dashboard.mode "sidecar" }}
    - name: dashboard
      port: {{ .Values.dashboard.sidecar.port }}
      targetPort: dashboard
      protocol: TCP
    {{- end }}
