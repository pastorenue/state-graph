apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "kflow.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kflow.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "kflow.selectorLabels" . | nindent 6 }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        {{- include "kflow.selectorLabels" . | nindent 8 }}
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      serviceAccountName: {{ include "kflow.serviceAccountName" . }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if eq .Values.dashboard.mode "sidecar" }}
      initContainers:
        - name: dashboard-copy
          image: {{ include "kflow.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["cp", "-r", "/ui/build/.", "/dashboard/"]
          securityContext:
            runAsNonRoot: true
            runAsUser: 65532
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            readOnlyRootFilesystem: true
          volumeMounts:
            - name: dashboard
              mountPath: /dashboard
      {{- end }}
      containers:
        - name: orchestrator
          image: {{ include "kflow.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.service.port }}
              protocol: TCP
          envFrom:
            - configMapRef:
                name: {{ include "kflow.fullname" . }}-config
            - secretRef:
                name: {{ include "kflow.secretName" . }}
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 15
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 6
        {{- if eq .Values.dashboard.mode "sidecar" }}
        - name: nginx
          image: {{ .Values.dashboard.sidecar.image.repository }}:{{ .Values.dashboard.sidecar.image.tag }}
          imagePullPolicy: {{ .Values.dashboard.sidecar.image.pullPolicy }}
          ports:
            - name: dashboard
              containerPort: {{ .Values.dashboard.sidecar.port }}
              protocol: TCP
          securityContext:
            runAsNonRoot: false
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: dashboard
              mountPath: /usr/share/nginx/html
              readOnly: true
            - name: nginx-conf
              mountPath: /etc/nginx/conf.d
              readOnly: true
            - name: nginx-cache
              mountPath: /var/cache/nginx
            - name: nginx-run
              mountPath: /var/run
        {{- end }}
      volumes:
        {{- if eq .Values.dashboard.mode "sidecar" }}
        - name: dashboard
          emptyDir: {}
        - name: nginx-conf
          configMap:
            name: {{ include "kflow.fullname" . }}-nginx
        - name: nginx-cache
          emptyDir: {}
        - name: nginx-run
          emptyDir: {}
        {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
